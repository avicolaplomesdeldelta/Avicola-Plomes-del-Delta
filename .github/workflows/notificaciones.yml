
name: Enviar notificaciones diarias

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  notificar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Instalar dependencias
        run: npm install firebase-admin web-push

      - name: Enviar notificaciones
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
        run: node notif-sender.js

      - name: Mantener workflow activo
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          echo "$(date)" > .last-notif
          git add .last-notif
          git diff --staged --quiet || git commit -m "chore: keep workflow active [skip ci]"
          git push
